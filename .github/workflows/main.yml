name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true

      - name: Install Yarn
        run: npm install -g yarn

      - name: Create deployment directory
        run: mkdir -p /host-web-directory/front-end

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Build project
        run: yarn build

      - name: Copy build to host directory
        run: |
          rm -rf /host-web-directory/front-end/*
          cp -r dist/* /host-web-directory/front-end/
